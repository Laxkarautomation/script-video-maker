<!DOCTYPE html>
<html>
<head>
  <title>Script Video Maker</title>
  <meta charset="UTF-8" />
</head>
<body style="background:#111;color:white;font-family:Arial;padding:30px">
  <h1>Script Video Maker</h1>

  <textarea id="script" style="width:95%;height:300px;font-size:18px" placeholder="Hindi/Hinglish script yaha paste karo"></textarea>
  <br><br>

  <button onclick="generateVideo()" style="font-size:20px;padding:12px 25px">Generate MP4</button>

  <p id="status"></p>

  <a id="download" href="#" download="video.mp4" style="display:none;color:white;background:#2563eb;padding:12px 20px;text-decoration:none;margin-bottom:20px;border-radius:6px">
    Download MP4
  </a>

  <br>

  <video id="video" controls style="display:none;width:360px;margin-top:20px"></video>

  <script src="app.js"></script>
</body>
</html>
